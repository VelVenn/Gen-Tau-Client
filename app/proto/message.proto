syntax = "proto3";

// RoboMaster 2026 机甲大师高校系列赛自定义客户端通信协议
// 版本: V1.2.0 (20260209)
// 包含所有上行和下行消息，使用 package 区分数据流方向。

// All messages' max QoS is 1 (AT LEAST ONCE)

// -------------------------------------------------------------------------
// Package 1: 上行消息 (Client -> Server)
// -------------------------------------------------------------------------
package Gentau.Topics;

// 2.2.1 KeyboardMouseControl
// 用途: 传输鼠标键盘输入 (频率: 75Hz)
message KeyboardMouseControl
{
	optional int32  mouse_x           = 1;  // 鼠标 x 轴移动速度, 负值标识向左移动
	optional int32  mouse_y           = 2;  // 鼠标 y 轴移动速度, 负值标识向下移动
	optional int32  mouse_z           = 3;  // 鼠标滚轮移动速度, 负值标识向后滚动
	optional bool   left_button_down  = 4;  // 左键是否按下 (false=抬起, true=按下)
	optional bool   right_button_down = 5;  // 右键是否按下 (false=抬起, true=按下)
	optional uint32 keyboard_value    = 6;  // 键盘按键位掩码
	optional bool   mid_button_down   = 7;  // 中键是否按下 (false=抬起, true=按下)

	// keyboard_value mask: (bit 0 - 15)
	// 0: W, 1: S, 2: A, 3: D, 4: Shift, 5: Ctrl
	// 6: Q, 7: E, 8: R, 9: F, 10: G
	// 11: Z, 12: X, 13: C, 14: V, 15: B
}

// 2.2.2 CustomControl
// 用途: 最大30字节的自定义数据 (频率: 75Hz)
message CustomControl
{
	optional bytes data = 1;  // 最大30字节的自定义数据
}

// 2.2.17 MapClickInfoNotify
// 用途: 云台手地图点击标记 (频率: 触发式发送，两次发送间隔不得低于0.5秒)
message MapClickInfoNotify
{
	// is_send_all 枚举值: 0=指定客户端, 1=除哨兵, 2=包含哨兵
	// mode 枚举值: 1=地图,2=对方机器人
	// type 枚举值: 1=攻击,2=防御,3=警戒,4=自定义

	optional uint32 is_send_all = 1;  // 发送范围
	optional bytes  robot_id    = 2;  // 目标机器人 ID 列表(固定7字节)
	optional uint32 mode        = 3;  // 标记模式
	optional uint32 enemy_id    = 4;  // 标定的对方 ID
	optional uint32 ascii       = 5;  // 自定义图标 ASCII 码
	optional uint32 type        = 6;  // 标记类型
	optional float  map_x       = 7;  // 地图坐标 X
	optional float  map_y       = 8;  // 地图坐标 Y
}

// 2.2.20 AssemblyCommand
// 用途: 工程装配指令 (频率: 触发式送达，最高不超过10Hz)
message AssemblyCommand
{
	// operation 枚举值: 1=确认装配, 2=取消装配

	optional uint32 operation  = 1;  // 装配操作类型
	optional uint32 difficulty = 2;  // 选中的装配难度
}

// 2.2.22 RobotPerformanceSelectionCommand
// 用途: 步兵/英雄选择性能体系 (频率: 触发式送达，最高不超过10Hz)
message RobotPerformanceSelectionCommand
{
	// shooter 枚举值: 1=冷却优先, 2=爆发优先, 3=英雄近战优先, 4=英雄远程优先
	// chassis 枚举值: 1=血量优先, 2=爆发优先, 3=英雄近战优先, 4=英雄远程优先
	// sentry_control 枚举值: 0=哨兵自动控制, 1=哨兵半自动控制

	optional uint32 shooter        = 1;  // 发射机构性能体系
	optional uint32 chassis        = 2;  // 底盘性能体系
	optional uint32 sentry_control = 3;  // 哨兵控制方式选择
}

// 2.2.24 CommonCommand
// 用途: 机器人多种常用指令 (频率： 触发式送达，最高不超过10Hz)
message CommonCommand
{
	// cmd_type 枚举值: 1=兑换17mm发弹量(金币需充足；参数值必须为10的倍数), 2=兑换42mm发弹量(金币需充足), 3=确认复活(读条完成时), 4=兑换立即复活(符合条件时，会立即买活), 5=远程兑换允许发弹量(满足要求时，会立即买弹), 6=远程兑换血量(满足要求时，会立即买血)

	optional uint32 cmd_type = 1;  // 命令类型
	optional uint32 param    = 2;  // 命令类型对应的参数
}

// 2.2.25 HeroDeployModeEventCommand
// 用途: 英雄部署模式指令 (频率: 触发式送达，最高不超过10Hz)
message HeroDeployModeEventCommand
{
	// mode 枚举值: 0=退出, 1=进入

	optional uint32 mode = 1;  // 模式
}

// 2.2.27 RuneActivateCommand
// 用途: 能量机关激活指令 (频率: 触发式送达，最高不超过10Hz)
message RuneActivateCommand
{
	optional uint32 activate = 1;  // 激活 (1=开启)
}

// 2.2.29 DartCommand
// 用途: 飞镖控制指令 (频率: 触发式送达，最高不超过10Hz)
message DartCommand
{
	// 目标ID 枚举值: 1=前哨站, 2=基地固定目标, 3=基地随机固定目标, 4=基地随机移动目标, 5=基地末端移动目标
	optional uint32 target_id      = 1;  // 目标ID
	optional bool   open           = 2;  // 闸门开关
	optional bool   launch_confirm = 3;  // 确认是否发射 (默认为0，1位确认发射)
}

// 2.2.32 SentryCtrlCommand
// 用途: 哨兵控制指令请求 (频率: 触发式送达，最高不超过10Hz)
message SentryCtrlCommand
{
	// command_id 枚举值: 0=无效, 1=补血点补弹, 2=补给站实体补弹, 3=远程补弹, 4=远程回血, 5=确认复活, 6=确认花费金币复活, 7=地图标点, 8=切换为进攻姿态, 9=切换为防御姿态, 10=切换为移动姿态
	optional uint32 command_id = 1;  // 指令编号
}

// 2.2.34 AirSupportCommand
// 用途: 空中支援指令 (频率: 1Hz)
message AirSupportCommand
{
	// command_id 枚举值: 1:免费呼叫, 2:花费金币呼叫, 3:中断
	optional uint32 command_id = 1;  // 指令类型
}

// -------------------------------------------------------------------------
// Package 2: 下行消息 (Server -> Client)
// -------------------------------------------------------------------------

// 2.2.3 GameStatus
// 用途: 同步比赛全局状态信息 (频率: 5Hz)
message GameStatus
{
	// current_stage 枚举值: 0:未开始比赛, 1:准备阶段, 2:十五秒裁判系统自检阶段, 3:五秒倒计时, 4:比赛中, 5:比赛结算中

	optional uint32 current_round       = 1;  // 当前局号(从1开始)
	optional uint32 total_rounds        = 2;  // 总局数
	optional uint32 red_score           = 3;  // 红方得分
	optional uint32 blue_score          = 4;  // 蓝方得分
	optional uint32 current_stage       = 5;  // 当前阶段
	optional int32  stage_countdown_sec = 6;  // 当前阶段剩余时间
	optional int32  stage_elapsed_sec   = 7;  // 当前阶段已过时间(秒)
	optional bool   is_paused           = 8;  // 是否暂停
}

// 2.2.4 GlobalUnitStatus
// 用途: 同步基地、前哨站和所有机器人状态 (频率: 1Hz)
message GlobalUnitStatus
{
	// base_status 枚举值: 0:无敌, 1:解除无敌，护甲未展开, 2:解除无敌，护甲展开
	// outpost_status 枚举值: 0:无敌, 1:存活，解除无敌，中部装甲旋转, 2:存活，解除无敌，中部装甲停转, 3:被击毁，不可重建, 4:被击毁，可重建, 5:被击毁，重建中

	optional uint32 base_health          = 1;   // 基地当前血量(0=已摧毀)
	optional uint32 base_status          = 2;   // 基地状态
	optional uint32 base_shield          = 3;   // 基地当前护盾值(0=无护盾)
	optional uint32 outpost_health       = 4;   // 前哨站当前血量(0=已摧毁)
	optional uint32 outpost_status       = 5;   // 前哨站状态
	optional uint32 enemy_base_health    = 6;   // 对方基地当前血量(0=已摧毁)
	optional uint32 enemy_base_status    = 7;   // 对方基地状态
	optional uint32 enemy_base_shield    = 8;   // 对方基地当前护盾值(0=无护盾)
	optional uint32 enemy_outpost_health = 9;   // 对方前哨站当前血量(0=已摧毁)
	optional uint32 enemy_outpost_status = 10;  // 对方前哨站状态
	repeated uint32 robot_health         = 11;  // 所有机器人血量(先己方后对方)
	repeated int32  robot_bullets        = 12;  // 己方机器人剩余累计发弹量
	optional uint32 total_damage_ally    = 13;  // 己方累计总伤害
	optional uint32 total_damage_enemy   = 14;  // 对方累计总伤害
}

// 2.2.5 GlobalLogisticsStatus
// 用途: 同步全局后勤信息 (频率: 1Hz)
message GlobalLogisticsStatus
{
	optional uint32 remaining_economy      = 1;  // 己方当前经济
	optional uint64 total_economy_obtained = 2;  // 己方累计总经济
	optional uint32 tech_level             = 3;  // 己方科技等级(工程机器人曾装配最高难度)
	optional uint32 encryption_level       = 4;  // 己方加密等级(雷达解析信息波机制)
}

// 2.2.6 GlobalSpecialMechanism
// 用途: 同步正在生效的全局特殊机制 (频率: 1Hz)
message GlobalSpecialMechanism
{
	// mechanism_id 枚举值: 1:己方堡垒被对方占领计时, 2:对方堡垒被己方占领计时
	repeated uint32 mechanism_id       = 1;  // 正在生效的机制 ID 列表
	repeated int32  mechanism_time_sec = 2;  // 对应的时间参数(秒)
}

// 2.2.7 Event
// 用途: 全局事件通知 (频率: 触发式发送)
message Event
{
	optional int32  event_id = 1;  // 事件编号
	optional string param    = 2;  // 事件参数(含义随 event_id变化)
}

// 2.2.8 RobotInjuryStat
// 用途: 机器人一次存活期间累计受伤统计 (频率: 1Hz)
message RobotInjuryStat
{
	optional uint32 total_damage            = 1;   // 该次存活累计受伤总计
	optional uint32 collision_damage        = 2;   // 撞击伤害
	optional uint32 small_projectile_damage = 3;   // 17mm 弹丸伤害
	optional uint32 large_projectile_damage = 4;   // 42mm 弹丸伤害
	optional uint32 dart_splash_damage      = 5;   // 飞镖溅射伤害
	optional uint32 module_offline_damage   = 6;   // 模块离线扣血
	optional uint32 offline_damage          = 7;   // 异常离线扣血
	optional uint32 penalty_damage          = 8;   // 判罚扣血
	optional uint32 server_kill_damage      = 9;   // 服务器强制使其战亡扣血
	optional uint32 killer_id               = 10;  // 击杀者ID(若未检测到击杀者,值为0)
}

// 2.2.9 RobotRespawnStatus
// 用途: 机器人复活状态同步 (频率: 1Hz)
message RobotRespawnStatus
{
	optional bool   is_pending_respawn       = 1;  // 是否处于待复活状态
	optional uint32 total_respawn_progress   = 2;  // 复活所需总读条
	optional uint32 current_respawn_progress = 3;  // 当前复活读条进度
	optional bool   can_free_respawn         = 4;  // 是否可以免费复活
	optional uint32 gold_cost_for_respawn    = 5;  // 花费金币复活所需金币数
	optional bool   can_pay_for_respawn      = 6;  // 是否允许花费金币复活
}

// 2.2.10 RobotStaticStatus
// 用途: 机器人固定属性和配置 (频率: 1Hz)
message RobotStaticStatus
{
	// connection_state 枚举值: 0=未连接, 1=连接
	// field_state 枚举值: 0=已上场, 1=未上场
	// alive_state 枚举值: 0=未知, 1=存活, 2=战亡
	// performace_system_shooter 枚举值: 1=冷却优先, 2=爆发优先, 3=英雄近战优先, 4=英雄远程优先
	// performace_system_chassis 枚举值: 1=血量优先, 2=功率优先, 3=英雄近战优先, 4=英雄远程优先

	optional uint32 connection_state           = 1;   // 连接状态
	optional uint32 field_state                = 2;   // 上场状态
	optional uint32 alive_state                = 3;   // 存活状态
	optional uint32 robot_id                   = 4;   // 机器人编号
	optional uint32 robot_type                 = 5;   // 机器人类型
	optional uint32 performance_system_shooter = 6;   // 性能体系-发射机构
	optional uint32 performance_system_chassis = 7;   // 性能体系-底盘
	optional uint32 level                      = 8;   // 当前等级
	optional uint32 max_health                 = 9;   // 最大血量
	optional uint32 max_heat                   = 10;  // 最大热量
	optional float  heat_cooldown_rate         = 11;  // 热量冷却速率(每秒)
	optional uint32 max_power                  = 12;  // 最大功率
	optional uint32 max_buffer_energy          = 13;  // 最大缓冲能量
	optional uint32 max_chassis_energy         = 14;  // 最大底盘能量
}

// 2.2.11 RobotDynamicStatus
// 用途: 机器人实时数据 (频率: 10Hz)
message RobotDynamicStatus
{
	optional uint32 current_health            = 1;   // 当前血量
	optional float  current_heat              = 2;   // 当前热量
	optional float  last_projectile_fire_rate = 3;   // 上一次弹丸射速
	optional uint32 current_chassis_energy    = 4;   // 当前剩余底盘能量
	optional uint32 current_buffer_energy     = 5;   // 当前缓冲能量
	optional uint32 current_experience        = 6;   // 当前经验值
	optional uint32 experience_for_upgrade    = 7;   // 升级所需经验
	optional uint32 total_projectiles_fired   = 8;   // 累计已发弹量
	optional uint32 remaining_ammo            = 9;   // 剩余允许发弹量
	optional bool   is_out_of_combat          = 10;  // 是否处于脱战状态
	optional uint32 out_of_combat_countdown   = 11;  // 脱战状态倒计时
	optional bool   can_remote_heal           = 12;  // 是否可以远程补血
	optional bool   can_remote_ammo           = 13;  // 是否可以远程补弹
}

// 2.2.12 RobotModuleStatus
// 用途: 机器人各模块运行状态 (频率: 1Hz)
message RobotModuleStatus
{
	// 状态枚举值: 0=离线, 1=在线, 2=因安装不规范被视为离线

	optional uint32 power_manager          = 1;   // 电源管理模块状态
	optional uint32 rfid                   = 2;   // RFID 模块状态
	optional uint32 light_strip            = 3;   // 灯条模块状态
	optional uint32 small_shooter          = 4;   // 17mm 发射机构状态
	optional uint32 big_shooter            = 5;   // 42mm 发射机构状态
	optional uint32 uwb                    = 6;   // 定位模块状态
	optional uint32 armor                  = 7;   // 装甲模块状态
	optional uint32 video_transmission     = 8;   // 图传模块状态
	optional uint32 capacitor              = 9;   // 电容模块状态
	optional uint32 main_controller        = 10;  // 主控状态
	optional uint32 laser_detection_module = 11;  // 激光检测模块状态
}

// 2.2.13 RobotPosition
// 用途: 机器人空间坐标和朝向 (频率: 1Hz)
message RobotPosition
{
	optional float  x        = 1;  // 世界坐标 X 轴
	optional float  y        = 2;  // 世界坐标 Y 轴
	optional float  z        = 3;  // 世界坐标 Z 轴
	optional float  yaw      = 4;  // 本机器人测速模块的朝向,单位:度,正北为0度
	optional uint32 robot_id = 5;
	// 接受到的坐标归属机器人，6/106 为空中机器人，7/107 为哨兵机器人（仅云台手客户端生效）
}

// 2.2.14 Buff
// 用途: Buff 效果信息，获得增益时触发发送，此后 1Hz 定频发送直到失去增益 (频率: 1Hz)
message Buff
{
	// buff_type 枚举值: 1:攻击增益, 2=防御增益, 3=射击热量冷却增益, 4=底盘功率增益, 5=回血增益, 6=可兑换允许发弹量 7:地形跨越增益(预备)

	optional uint32 robot_id       = 1;  // 机器人 ID
	optional uint32 buff_type      = 2;  // Buff 类型
	optional int32  buff_level     = 3;  // Buff 增益值
	optional uint32 buff_max_time  = 4;  // Buff 最大剩余时间
	optional uint32 buff_left_time = 5;  // Buff 剩余时间
}

// 2.2.15 PenaltyInfo
// 用途: 判罚信息同步 (频率: 触发式发送)
message PenaltyInfo
{
	// penalty_type 枚举值: 1:黄牌, 2:双方黄牌, 3:红牌, 4:超功率, 5:超热量, 6:超射速
	optional uint32 penalty_type       = 1;  // 当前受罚类型
	optional uint32 penalty_effect_sec = 2;  // 当前受罚效果时长(秒)
	optional uint32 total_penalty_num  = 3;  // 当前判罚数量
}

// 2.2.16 RobotPathPlanInfo
// 用途: 哨兵轨迹规划信息 (频率: 触发式发送)
message RobotPathPlanInfo
{
	// intention 枚举值: 1=攻击, 2=防守, 3=移动

	optional uint32 intention   = 1;                  // 哨兵意图
	optional uint32 start_pos_x = 2;                  // 起始点 X 坐标(分米)
	optional uint32 start_pos_y = 3;                  // 起始点 Y 坐标(分米)
	repeated int32  offset_x    = 4 [packed = true];  // 相对起始点 X 增量数组(-128~+127,长度49)
	repeated int32  offset_y    = 5 [packed = true];  // 相对起始点 Y 增量数组(-128~+127,长度49)
	optional uint32 sender_id   = 6;                  // 发送者 ID
}

// 2.2.18 RaderInfoToClient
// 用途: 雷达发送的机器人位置信息 (频率: 触发式发送)
message RaderInfoToClient
{
	// is_high_light 枚举值: 0=否, 1=是, 2=是，但目标机器人定位模块离线

	repeated RadarSingleRobotInfo robot_info = 1;
}

message RadarSingleRobotInfo
{
	optional uint32 target_pos_x  = 1;  // 目标位置 X(米)
	optional uint32 target_pos_y  = 2;  // 目标位置 Y(米)
	optional uint32 is_high_light = 3;  // 是否特殊标识
}

// 2.2.19 CustomByteBlock
// 用途: 机器人自定义上传数据流 (机器人端对应0x0310) (频率: 50Hz)
message CustomByteBlock
{
	optional bytes data = 1;  // 最大为 2.4 kbit (300 B) 的自定义数据包
}

// 2.2.21 TechCoreMotionStateSync
// 用途: 科技核心运动状态同步 (频率: 1Hz)
message TechCoreMotionStateSync
{
	// status 枚举值: 1:未进入装配状态, 2:已选择装配难度，科技核心移动中, 3:科技核心移动完成，可进行首个装配步骤, 4:上一个装配步骤已完成，可进行下一个装配步骤, 5:装配步骤已全部完成 6:已确认装配,科技核心移动中
	// enemy_core_status 枚举值: 0=对方没有正在装配, 1=对方正在装配非四级难度, 2=对方正在装配四级难度

	uint32 maximum_difficulty_level = 1;  // 当前可选择的最高装配难度等级
	uint32 status                   = 2;  // 科技核心状态
	uint32 enemy_core_status        = 3;  // 对方科技核心状态，仅己方四级装配可用时有效
	uint32 remain_time_all          = 4;  // 己方装配剩余时长
	uint32 remain_time_step         = 5;  // 己方单个步骤装配间隔剩余时长
}

// 2.2.23 RobotPerformanceSelectionSync
// 用途: 步兵/英雄性能体系状态同步 (频率: 1Hz)
message RobotPerformanceSelectionSync
{
	// shooter 枚举值: 1=冷却优先, 2=爆发优先, 3=英雄近战优先, 4=英雄远程优先
	// chassis 枚举值: 1=血量优先, 2=爆发优先, 3=英雄近战优先, 4=英雄远程优先
	// sentry_control 枚举值: 0=哨兵自动控制, 1=哨兵半自动控制

	uint32 shooter        = 1;  // 发射机构性能体系
	uint32 chassis        = 2;  // 底盘性能体系
